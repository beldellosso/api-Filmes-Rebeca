# ==========================================
# CONFIGURAÇŐES GERAIS DA APLICAÇĂO
# ==========================================
quarkus.application.name=api-filmes-rebeca

# ==========================================
# CONFIGURAÇŐES HTTP E SERVIDOR
# ==========================================
quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}
quarkus.package.type=uber-jar

# ==========================================
# CORS (Cross-Origin Resource Sharing)
# ==========================================
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-api-key,idempotency-key,x-api-version
quarkus.http.cors.exposed-headers=X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset

# ==========================================
# OPENAPI / SWAGGER DOCUMENTATION
# ==========================================
quarkus.smallrye-openapi.info-title=API de gerenciamento de filmes
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de filmes da disciplina de Web Services da turma de TSI do SENAC. Implementa recursos avançados como autenticaçăo, rate limiting, versionamento e idempotęncia.
quarkus.smallrye-openapi.info-terms-of-service=No terms
quarkus.smallrye-openapi.info-contact-email=techsupport@senac.com.br
quarkus.smallrye-openapi.info-contact-name=Senac TSI
quarkus.smallrye-openapi.info-contact-url=http://sp.senac.com.br
quarkus.smallrye-openapi.info-license-name=Apache 2.0
quarkus.smallrye-openapi.info-license-url=https://www.apache.org/licenses/LICENSE-2.0.html
quarkus.smallrye-openapi.open-api-version=3.0.4
quarkus.smallrye-openapi.path=/docs
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.theme=outline

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.category."org.hibernate.SQL".level=INFO

# ==========================================
# CACHE CONFIGURATION
# ==========================================
quarkus.cache.caffeine.books-cache.expire-after-write=PT15S
quarkus.cache.caffeine.idempotency-cache.expire-after-write=PT24H
quarkus.cache.caffeine.ratelimit-cache.expire-after-write=PT1M

# ==========================================
# SECURITY CONFIGURATION (API Key)
# ==========================================
api.security.keys=SENAC-API-KEY-12345,CHAVE-DO-PROFESSOR,CHAVE-DO-ADMIN

# ==========================================
# RATE LIMITING CONFIGURATION
# ==========================================
api.ratelimit.limit=5
api.ratelimit.window.seconds=10

# ==========================================
# CONFIGURAÇŐES ESPECÍFICAS POR AMBIENTE
# ==========================================

# --- PERFIL DEV (Desenvolvimento Local) ---
%dev.quarkus.smallrye-openapi.info-title=API de Filmes (desenvolvimento)
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:db_dev;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.sql-load-script=import.sql
%dev.quarkus.log.category."org.hibernate.SQL".level=DEBUG
%dev.quarkus.devservices.enabled=true

# --- PERFIL TEST (Testes Automatizados) ---
%test.quarkus.smallrye-openapi.info-title=API de Filmes (testes)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:db_test
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

# --- PERFIL PROD (Produçăo - Render) ---
# IMPORTANTE: No Render, usamos H2 em memória porque o sistema de arquivos
# é efęmero (reseta a cada deploy). Para persistęncia real, use PostgreSQL.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:filmesdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.mapping.finished-level=default
quarkus.devservices.enabled=false

# ==========================================
# CONFIGURAÇŐES ADICIONAIS PARA PRODUÇĂO
# ==========================================
# Health checks (usado pelo Render)
quarkus.smallrye-health.ui.always-include=true

# Métricas (opcional)
quarkus.micrometer.enabled=false

# Desabilitar banner do Quarkus em produçăo (opcional)
quarkus.banner.enabled=true